version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 90
    labels:
      - dependencies
      - no-changelog
    milestone: 11
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /webapp
    cooldown:
      semver-major-days: 90
      semver-minor-days: 21
      semver-patch-days: 3
    labels:
      - dependencies
      - frontend
    milestone: 11
    schedule:
      interval: daily
    versioning-strategy: increase

  - package-ecosystem: uv
    directory: /
    cooldown:
      semver-major-days: 90
      semver-minor-days: 21
      semver-patch-days: 3
      exclude:
        - tzdata
    labels:
      - dependencies
    milestone: 11
    schedule:
      interval: daily
    versioning-strategy: increase
