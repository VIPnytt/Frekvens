name: IKEA Obegränsad LED wall lamp

on:
  merge_group:
    types:
      - checks_requested

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  config:
    name: Workflow configuration
    runs-on: ubuntu-latest
    outputs:
      node-cache: ${{ steps.nodejs.outputs.cache }}
      pio-environments: ${{ steps.platformio.outputs.environments }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: 3.14
          activate-environment: true

      - name: Set up Python packages
        run: uv sync --only-group nodejs --only-group platformio

      - name: Node.js cache
        id: nodejs
        run: echo "cache=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: PlatformIO environments
        id: platformio
        run: echo "environments=$(pio project config --json-output | jq -c '[.[] | .[0] | select(startswith("env:")) | sub("^env:"; "")]')" >> "$GITHUB_OUTPUT"

  default:
    name: Default
    needs: config
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: ${{ fromJson(needs.config.outputs.pio-environments) }}
        toolchain:
          - python-version: "3.10"
          - python-version: 3.14

        exclude:
          - environment: adafruit_qtpy_esp32s2
            toolchain:
              python-version: "3.10"

          - environment: adafruit_qtpy_esp32s3_n4r2
            toolchain:
              python-version: "3.10"

          - environment: adafruit_qtpy_esp32s3_nopsram
            toolchain:
              python-version: "3.10"

          - environment: lolin_d32
            toolchain:
              python-version: "3.10"

          - environment: lolin_d32_pro
            toolchain:
              python-version: "3.10"

          - environment: lolin_s3_mini
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32c3
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32c6
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32s3
            toolchain:
              python-version: "3.10"

          - environment: wemos_d1_mini32
            toolchain:
              python-version: "3.10"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Cache for Node.js
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: nodejs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('webapp/package-lock.json') }}
          path: ${{ needs.config.outputs.node-cache }}

      - name: Set up Cache for PlatformIO
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: platformio-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.toolchain.python-version }}
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO build
        run: |
          echo "IKEA_OBEGRANSAD='true'" >> .env

          cat <<'EOL' > firmware/include/config/secrets.h
          #pragma once
          #define PIN_CS 1
          #define PIN_MOSI 2
          #define PIN_OE 3
          #define PIN_SCLK 4
          #define PIN_SW2 5
          #define WIFI_KEY "redacted"
          #define WIFI_SSID "redacted"
          EOL

          pio run -e ${{ matrix.environment }}

  minimal:
    name: Minimal
    needs: config
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: ${{ fromJson(needs.config.outputs.pio-environments) }}
        toolchain:
          - python-version: "3.10"
          - python-version: 3.14

        exclude:
          - environment: adafruit_qtpy_esp32s2
            toolchain:
              python-version: "3.10"

          - environment: adafruit_qtpy_esp32s3_n4r2
            toolchain:
              python-version: "3.10"

          - environment: adafruit_qtpy_esp32s3_nopsram
            toolchain:
              python-version: "3.10"

          - environment: lolin_d32
            toolchain:
              python-version: "3.10"

          - environment: lolin_d32_pro
            toolchain:
              python-version: "3.10"

          - environment: lolin_s3_mini
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32c3
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32c6
            toolchain:
              python-version: "3.10"

          - environment: seeed_xiao_esp32s3
            toolchain:
              python-version: "3.10"

          - environment: wemos_d1_mini32
            toolchain:
              python-version: "3.10"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Cache for PlatformIO
        continue-on-error: true
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: platformio-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.toolchain.python-version }}
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO build
        run: |
          cat <<'EOL' > .env
          EXTENSION_BUTTON='true'
          HOSTNAME='obegransad'
          IKEA_OBEGRANSAD='true'
          MODE_CIRCLE='true'
          MODE_LINES='true'
          MODE_NOISE='true'
          MODE_RAIN='true'
          MODE_SCAN='true'
          MODE_STARS='true'
          NAME='Obegränsad'
          EOL

          cat <<'EOL' > firmware/include/config/secrets.h
          #pragma once
          #define PIN_CS 1
          #define PIN_MOSI 2
          #define PIN_OE 3
          #define PIN_SCLK 4
          #define PIN_SW2 5
          #define WIFI_KEY "redacted"
          #define WIFI_SSID "redacted"
          EOL

          pio run -e ${{ matrix.environment }}

  typical:
    name: Typical
    needs: config
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: ${{ fromJson(needs.config.outputs.pio-environments) }}
        toolchain:
          - python-version: "3.10"
          - python-version: 3.14

        exclude:
          - environment: adafruit_qtpy_esp32s2
          - environment: adafruit_qtpy_esp32s3_n4r2

          - environment: adafruit_qtpy_esp32s3_nopsram
            toolchain:
              python-version: "3.10"

          - environment: esp32-c3-devkitm-1
          - environment: esp32-c5-devkitc-1
          - environment: esp32-c6-devkitm-1
          - environment: esp32dev
          - environment: lolin_d32
          - environment: lolin_d32_pro
          - environment: lolin_s3_mini
          - environment: seeed_xiao_esp32c3
          - environment: seeed_xiao_esp32c6

          - environment: seeed_xiao_esp32s3
            toolchain:
              python-version: "3.10"

          - environment: wemos_d1_mini32

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Cache for Node.js
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: nodejs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('webapp/package-lock.json') }}
          path: ${{ needs.config.outputs.node-cache }}

      - name: Set up Cache for PlatformIO
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: platformio-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.toolchain.python-version }}
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO build
        run: |
          cat <<'EOL' > .env
          EXTENSION_ALEXA='true'
          EXTENSION_BUTTON='true'
          EXTENSION_HEAP='true'
          EXTENSION_HOMEASSISTANT='true'
          EXTENSION_MESSAGE='true'
          EXTENSION_MQTT='true'
          EXTENSION_OTA='true'
          EXTENSION_PLAYLIST='true'
          EXTENSION_RESTFUL='true'
          EXTENSION_SERVERSENTEVENTS='true'
          EXTENSION_SIGNAL='true'
          EXTENSION_WEBAPP='true'
          EXTENSION_WEBSOCKET='true'
          FONT_BRAILLE='true'
          HOSTNAME='obegransad'
          IKEA_OBEGRANSAD='true'
          MODE_ANIMATION='true'
          MODE_ARROW='true'
          MODE_BINARYCLOCK='true'
          MODE_BINARYEPOCH='true'
          MODE_BLINDS='true'
          MODE_BLINK='true'
          MODE_BREAKOUTCLOCK='true'
          MODE_BRIGHT='true'
          MODE_CIRCLE='true'
          MODE_CLOCK='true'
          MODE_COUNTDOWN='true'
          MODE_DRAW='true'
          MODE_EQUALIZER='true'
          MODE_FIREWORK='true'
          MODE_FLIES='true'
          MODE_GAMEOFLIFE='true'
          MODE_GLITTER='true'
          MODE_HOMETHERMOMETER='true'
          MODE_JAGGEDWAVEFORM='true'
          MODE_LEAFFALL='true'
          MODE_LINES='true'
          MODE_METABALLS='true'
          MODE_NOISE='true'
          MODE_OPENMETEO='true'
          MODE_PINGPONG='true'
          MODE_PIXELSEQUENCE='true'
          MODE_RAIN='true'
          MODE_RING='true'
          MODE_SCAN='true'
          MODE_SMOOTHWAVEFORM='true'
          MODE_SNAKE='true'
          MODE_STARS='true'
          MODE_STREAM='true'
          MODE_TICKER='true'
          MODE_WAVEFORM='true'
          MODE_WTTRIN='true'
          MODE_YR='true'
          NAME='Obegränsad'
          EOL

          cat <<'EOL' > firmware/include/config/secrets.h
          #pragma once
          #define LATITUDE "0.000"
          #define LOCATION "redacted"
          #define LONGITUDE "0.000"
          #define MQTT_HOST "mqtt.local"
          #define MQTT_KEY "redacted"
          #define MQTT_USER "redacted"
          #define PIN_CS 1
          #define PIN_MOSI 2
          #define PIN_OE 3
          #define PIN_SCLK 4
          #define PIN_SW2 5
          #define WIFI_KEY "redacted"
          #define WIFI_SSID "redacted"
          EOL

          pio run -e ${{ matrix.environment }}

  extensive:
    name: Extensive
    needs: config
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: ${{ fromJson(needs.config.outputs.pio-environments) }}
        toolchain:
          - python-version: "3.10"
          - python-version: 3.14

        exclude:
          - environment: adafruit_qtpy_esp32s2
          - environment: adafruit_qtpy_esp32s3_n4r2

          - environment: adafruit_qtpy_esp32s3_nopsram
