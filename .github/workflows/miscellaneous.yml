  homethermometer-updater:
    name: Home thermometer updater
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python-version: '3.10'
          - python-version: 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Set up Frekvens tools
        run: uv sync --no-dev

      - name: Set up HTTP server
        run: |
          python - << 'EOF' &
          import http.server
          class Test(http.server.BaseHTTPRequestHandler):
              def do_PATCH(self):
                  self.send_response(202 if self.path == "/restful/Home%20thermometer" else 404)
                  self.end_headers()
          http.server.HTTPServer(("127.0.0.1", 8080), Test).serve_forever()
          EOF

          sudo iptables -t nat -A OUTPUT -p tcp --dport 80 -j REDIRECT --to-ports 8080
          sudo iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-ports 8080

      - name: Home thermometer updater
        run: python -m frekvens.HomeThermometerUpdater 127.0.0.1 --indoor=22 --outdoor=8

  mode-switcher:
    name: Mode switcher
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python-version: '3.10'
          - python-version: 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Set up Frekvens tools
        run: uv sync --no-dev

      - name: Set up HTTP server
        run: |
          python - << 'EOF' &
          import http.server
          class Test(http.server.BaseHTTPRequestHandler):
              def do_PATCH(self):
                  self.send_response(202 if self.path == "/restful/Modes" else 404)
                  self.end_headers()
          http.server.HTTPServer(("127.0.0.1", 8080), Test).serve_forever()
          EOF

          sudo iptables -t nat -A OUTPUT -p tcp --dport 80 -j REDIRECT --to-ports 8080
          sudo iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-ports 8080

      - name: Mode switcher
        run: python -m frekvens.ModeSwitcher 127.0.0.1 --mode=Test

  package-lock:
    name: package-lock.json consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: npm package-lock check
        working-directory: webapp
        run: |
          npm install --package-lock-only
          git diff --exit-code -- package-lock.json

  uv-lock:
    name: uv.lock consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: pyproject.toml
          python-version: 3.14

      - name: uv lock check
        run: uv lock --check
