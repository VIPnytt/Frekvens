  homethermometer-updater:
    name: Home thermometer updater
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python-version: "3.10"
          - python-version: 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Set up Frekvens tools
        run: uv sync --no-dev

      - name: Set up HTTP server
        run: |
          python - << 'EOF' &
          import http.server
          class Test(http.server.BaseHTTPRequestHandler):
              def do_PATCH(self):
                  self.send_response(202 if self.path == "/restful/Home%20thermometer" else 404)
                  self.end_headers()
          http.server.HTTPServer(("127.0.0.1", 8080), Test).serve_forever()
          EOF

          sudo iptables -t nat -A OUTPUT -p tcp --dport 80 -j REDIRECT --to-ports 8080
          sudo iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-ports 8080

      - name: Home thermometer updater
        run: python -m frekvens.HomeThermometerUpdater 127.0.0.1 --indoor=22 --outdoor=8

  mode-switcher:
    name: Mode switcher
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python-version: "3.10"
          - python-version: 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Set up Frekvens tools
        run: uv sync --no-dev

      - name: Set up HTTP server
        run: |
          python - << 'EOF' &
          import http.server
          class Test(http.server.BaseHTTPRequestHandler):
              def do_PATCH(self):
                  self.send_response(202 if self.path == "/restful/Modes" else 404)
                  self.end_headers()
          http.server.HTTPServer(("127.0.0.1", 8080), Test).serve_forever()
          EOF

          sudo iptables -t nat -A OUTPUT -p tcp --dport 80 -j REDIRECT --to-ports 8080
          sudo iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-ports 8080

      - name: Mode switcher
        run: python -m frekvens.ModeSwitcher 127.0.0.1 --mode=Test

  package-lock:
    name: package-lock.json consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: npm package-lock check
        working-directory: webapp
        run: |
          npm install --package-lock-only
          git diff --exit-code -- package-lock.json

  uv-lock:
    name: uv.lock consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: 3.14

      - name: uv lock check
        run: uv lock --check

  x509_crt_bundle:
    name: x509 certificate bundle
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - python-version: "3.10"
          - python-version: 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Cache for PlatformIO
        continue-on-error: true
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          key: platformio-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version-file: pyproject.toml
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO build
        continue-on-error: true
        run: |
          cat <<EOL > .env
          HOSTNAME='frekvens'
          IKEA_FREKVENS='true'
          MODE_GOOGLEWEATHER='true'
          MODE_OPENMETEO='true'
          MODE_OPENWEATHER='true'
          MODE_WORLDWEATHERONLINE='true'
          MODE_WTTRIN='true'
          MODE_YR='true'
          NAME='Frekvens'
          EOL

          cat <<EOL > firmware/include/config/secrets.h
          #pragma once
          #define GOOGLEWEATHER_KEY "redacted"
          #define LATITUDE "0.000"
          #define LONGITUDE "0.000"
          #define OPENWEATHER_KEY "redacted"
          #define PIN_CS 1
          #define PIN_MOSI 2
          #define PIN_OE 3
          #define PIN_SCLK 4
          #define WIFI_KEY "redacted"
          #define WIFI_SSID "redacted"
          #define WORLDWEATHERONLINE_KEY "redacted"
          EOL

          pio run -e esp32dev

      - name: Checkout espressif/esp-idf
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: espressif/esp-idf
          ref: release/v5.5
          path: lib/esp-idf
          sparse-checkout: components/mbedtls/esp_crt_bundle/gen_crt_bundle.py
          sparse-checkout-cone-mode: false

      - name: Bundle comparison
        run: |
          python lib/esp-idf/components/mbedtls/esp_crt_bundle/gen_crt_bundle.py -i firmware/certs/bundle && \
          cmp x509_crt_bundle firmware/embed/x509_crt_bundle.bin
