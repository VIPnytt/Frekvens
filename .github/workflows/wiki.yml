name: Wiki

on:
  push:
    branches:
      - main

    paths:
      - docs/wiki/**

  workflow_dispatch:

permissions:
  contents: read

jobs:
  wiki:
    name: Wiki publication
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@1bbb4280446f9630e8e21a18012cbacf3b0f992e # v5.0.6
        with:
          path: docs/wiki
          commit-message: ${{ github.event.head_commit.message || format('Update wiki from {0}', github.sha) }}
