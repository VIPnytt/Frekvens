name: Wiki

on:
  push:
    branches:
      - main

    paths:
      - docs/wiki/**

  workflow_dispatch:

permissions:
  contents: read

jobs:
  wiki:
    name: Wiki publication
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@64efa0a9436db17670a2259e0ac249d6f08bb352 # v5.0.4
        with:
          path: docs/wiki
          commit-message: ${{ github.event.head_commit.message || format('Update wiki from {0}', github.sha) }}
