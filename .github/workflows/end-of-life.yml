name: End of life

on:
  schedule:
    - cron: 24 7 31 * *

  workflow_dispatch:

permissions:
  contents: read

jobs:
  idle-check:
    name: Idle check
    runs-on: ubuntu-slim

    outputs:
      active: ${{ steps.idle.outputs.active }}

    steps:
      - name: GitHub Script idle check
        id: idle
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data: branch } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: context.ref.replace('refs/heads/', ''),
            });
            const active = new Date() - new Date(branch.commit.commit.committer.date) <= 90 * 86400000;
            core.info(`Branch active: ${active}`);
            core.setOutput('active', active);

  nodejs-wheel:
    name: Node.js wheel version
    needs: idle-check
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.idle-check.outputs.active) }}
  
    outputs:
      version: ${{ steps.lock.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node.js wheel binaries version
        id: lock
        run: echo "version=$(yq '.package[] | select(.name == \"nodejs-wheel-binaries\") | .version' uv.lock)" >> "$GITHUB_OUTPUT"

  nodejs:
    name: Node.js
    needs:
      - idle-check
      - nodejs-wheel
    runs-on: ubuntu-slim
    continue-on-error: true
    if: ${{ fromJSON(needs.idle-check.outputs.active) }}

    strategy:
      matrix:
        node-version:
          - ${{ needs.nodejs-wheel.outputs.version }}
          - 24

    steps:
      - name: End-of-Life
        uses: sindrel/endoflife-github-action@5f91adaabc542a346876290ff0f447c7bc355f99 # v1.0.3
        with:
          product: nodejs
          version: ${{ matrix.node-version }}
          fail_on_eol: true

  python:
    name: Python
    needs: idle-check
    runs-on: ubuntu-slim
    continue-on-error: true
    if: ${{ fromJSON(needs.idle-check.outputs.active) }}

    strategy:
      matrix:
        include:
          - python-version: '3.10'
          - python-version: 3.13
          - python-version: 3.14

    steps:
      - name: End-of-Life
        uses: sindrel/endoflife-github-action@5f91adaabc542a346876290ff0f447c7bc355f99 # v1.0.3
        with:
          product: python
          version: ${{ matrix.python-version }}
          fail_on_eol: true
