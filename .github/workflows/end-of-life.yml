name: End of life

on:
  schedule:
    - cron: 0 12 1 * *

  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
          - python-version: 3.13
          - python-version: 3.14

    steps:
      - name: End-of-Life
        uses: sindrel/endoflife-github-action@6931ca61221cebfe107b0c3349979cb7075ff270 # v1.0.2
        with:
          product: python
          version: ${{ matrix.python-version }}
          fail_on_eol: true
