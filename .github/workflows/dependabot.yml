name: Dependabot Updates PlatformIO

on:
  schedule:
    - cron: 9 5 * * 1-5

  workflow_dispatch:

permissions:
  contents: read

jobs:
  platformio:
    name: Update PlatformIO dependencies
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: PlatformIO Dependency Updater
        uses: VIPnytt/platformio-dependency-updater@b411d22ddad4db6e57928e43e10748706af6507c # v1.0.0-a1
