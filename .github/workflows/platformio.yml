name: PlatformIO

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version-file: pyproject.toml
          python-version: 3.14
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO lint
        run: |
          OUTPUT=$(pio project config --lint --json-output)
          echo "$OUTPUT"
          if [ "$OUTPUT" != "{'errors': [], 'warnings': []}" ]; then
            exit 1
          fi

  pinning:
    name: Pinning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Cache for PlatformIO
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          key: platformio-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version-file: pyproject.toml
          python-version: 3.14
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO package install
        run: pio pkg install

      - name: Pinning check
        run: python .github/scripts/pinning.py
