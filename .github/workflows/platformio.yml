name: PlatformIO

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version-file: pyproject.toml
          python-version: 3.14
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO lint
        run: |
          OUTPUT=$(pio project config --lint --json-output)
          echo "$OUTPUT"
          if [ "$OUTPUT" != "{'errors': [], 'warnings': []}" ]; then
            exit 1
          fi

  pinning:
    name: Pinning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Cache for PlatformIO
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: platformio-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('platformio.ini') }}
          path: .platformio/.cache

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version-file: pyproject.toml
          python-version: 3.14
          activate-environment: true

      - name: Set up PlatformIO
        run: uv sync --only-group platformio

      - name: PlatformIO package install
        run: pio pkg install

      - name: Pinning check
        run: python .github/scripts/pinning.py
